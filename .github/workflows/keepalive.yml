# Keep-alive de la app (app.verdikt.finance, Render free tier): un ping cada
# 7 minutos evita que el servidor se duerma (se apaga a los ~15 min sin
# tráfico y el próximo visitante espera 30-50 s). Vive en ESTE repo público
# porque los minutos de Actions acá son gratis e ilimitados; en el repo
# privado de la app consumiría toda la cuota del plan free.
#
# OJO: GitHub desactiva los schedules si el repo no tiene actividad por 60
# días — si la landing pasa mucho tiempo sin commits, entrar a Actions y
# re-habilitarlo (avisa por mail antes).
name: Keep-alive de la app

on:
  schedule:
    - cron: "*/7 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 90 \
            "https://app.verdikt.finance/health")
          echo "respuesta: $code"
          test "$code" = "200"
